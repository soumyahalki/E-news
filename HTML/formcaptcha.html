<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content ="width=device-width, initial-scale=1.0">
    <title>Attributes</title>
    </head>
    <body>
    <h2>Captcha Form</h2>
    <form>
        <label for="captcha">Enter Captc+ha:</label>
        <input type="text" id="captcha" placeholder="Enter Captcha..." name="captcha">
         <br>
        <br>
        <label>Username: </label>
        <input type="text" placeholder="Enter name..." id="un">
        <br>
        <br>
        <label>Email :</label>
        <input type="email" name="email">
        <br>
        <br>
        <label>Password: <span style="color: red;">*</span></label>
        <input type="password" name="pwd" required>
        <br>
        <br>
        <label>Mobile :</label>
        <input type="tel">
        <br>
        <br>
        <label>Age :</label>
        <input type="number">
        <br>
        <br><label>Date of Birth :</label>
        <input type="date">
        <br>
        <br>
        <label>Date of Birth with time:</label>
        <input type="datetime-local">
        <br>
        <br>
        <label>Profile Url:</label>
        <input type="Url">
        <br>
        <br>
        <label><span style="color: blue;">Other</span></label>
         <input type="date">
        <br>
        <br>
          <label>Other:</label>
        <input type="image" src="download.jpeg">
        <br>
        <br>
        <label>Upload Pan Card :</label>
        <input type="file">
        <br>
        <br>
        <label>Rate out of 5</label>
        <input type="range" min="1" max="5" name="HTML Rating" value="0">
        <br>
        <br>
        <label><input type="checkbox" name="opt1" value="cash"> Cash</label>
         <label><input type="checkbox" name="opt2" value="UPI"> UPI</label>
          <label><input type="checkbox" name="opt3" value="Razorpay"> Razorpay</label>
        <br>
        <br>
        <label>Gender :</label>
        <label><input type="radio" name="opt" value="male">Male</label>
         <label><input type="radio" name="opt" value="female">Female</label>
        <br>
        <br>
        <label>You allowed :</label>
            <input type="hidden">
            <br>
            <br>
            <label for="tech">Choose the Tech Stack:</label>
            <select name="tech" multiple>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                 <option value="js">Javascript</option>
            </select>
            <br>
            <br>
            <label>Comments: </label>
            <textarea id="Comment" rows="5" cols="40" name="comments"
                placeholder="Enter Comments"></textarea>
            <br>
            <br>
        <input type="submit"> &nbsp; &nbsp; &nbsp; &nbsp;
        <button type="reset">Cancel</button>
        <br>
        <br>
         <button>help center</button>
        
    </form>
    </body>
        </html>
