<DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Div Tag</title>
    </head>
    <body>
         <!--Headings-->
        <h1 style="text-align: center;">Heading</h1>
<!--Block level Element -div, pre, p, h1 - h6-->
        <div>Hello</div>
        <div>Hi</div>
        <p>Hello </p>
        <p> Hi </p>
        <!-- Inline level Elements,a, img, u, sub, sup -->
         <span>Hello Everyone</span>
         <span> Hi </span>

         <p>Feb batch students are very <span style="color: red;">knowledgeble</span></p>
         <a href="https://www.youtube.com/watch?v=8pmcxUUARzM">song</a>
    </body>
    </html>
