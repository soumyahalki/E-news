<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content ="width=device-width, initial-scale=1.0">
    <title>Events</title>
    <style>
        #myDiv {
            width: 100px;
            height: 100px;
            background-color: aquamarine;
        }

    </style>
   </head>
   <body>
    <h2>Mouse events</h2>
    <br>
    <div id="myDiv"></div>
<br>
<input type="text">
<form>
    <label>Enter name:</label>
    <input type="text" id="name">
    <br>
    <br>
    <button type="submit">Submit</button>
</form>

    <!--mouse events-->
    <script>
        document.querySelector("form").addEventListener("submit", (e) => {
            e.preventDefault();
            alert("Form submitted successfully");
        });
        let box = document.getElementById("myDiv");
        box.addEventListener("click", () => {
        box.style.backgroundColor = "red";
    });
    box.addEventListener("dbclick", () => {
        box.style.backgroundColor = "yellow";
        box.innerText = "User dbl clicked";
    });

//Window Events
window.addEventListener("DOMContentLoaded" , () => {
    alert("Content Loaded Successfully");
});


window.addEventListener("resize", () => {
    alert("Window resized");
});

window.addEventListener("scroll", () => {
    console.log("Window scrolled", window.scrollY)
});
















































    box.addEventListener("mouseover", () => {
        box.style.backgroundColor = "blue";    
    });


     box.addEventListener("mouseout", () => {
        box.style.backgroundColor = "aqua";    
    });

    box.addEventListener("mousemove" , (e) => {
        box.innerText = 'X value: ${e.offsetX} and Yvalue: {e.offsetY}'  
        alert("Warning: dont move outside the box") 
         })

    document.querySelector('#myInput').addEventListener('focus', () => {
            console.log('Input field focused!');
        });

        document.querySelector('#myInput').addEventListener('blur', () => {
            console.log('Input field lost focus!');
        });


        document.querySelector('#myInput').addEventListener('change', (e) => {
            console.log('Input changed to: ${e.target.value}');
        });

        document.querySelector("#myInput").addEventListener("input", (e) => {
        console.log('The input is ${e.target.value}'); 
    })
    </script>
   </body>
   </html>
