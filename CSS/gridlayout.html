<!DOCTYPE html>
<html>
<head>
    <style>

        .container {
            display: grid;
            grid-template-columns: auto auto auto;
             gap: 5px;             
             background-color: gray;
            padding: 5px;
        }

   


.container div {
    background-color: blueviolet;
    text-align: center;
     padding: 10px;
      font-size: 30px;
}

.item1 {
    grid-column-start: 1;
    grid-column-end: 4;
}

.item2 {
     grid-row-start: 2;
      grid-column-end: 4;
}



</style>
</head>
<body>
    
    <h1>The grid-column Property</h1>


    <div class="container">
    <div class="item1">Header</div>
    <div class="item2">Sidebar</div>
    <div class="item3">3</div>
    <div class="item4">4</div>
    <div class="item5">5</div>
   
    </div>
    </body>
    </html>
