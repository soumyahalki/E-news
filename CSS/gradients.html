<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content ="width=device-width, initial-scale=1.0">
    <title>gradients</title>
    <style>
        #lg {
            height: 200px;
            width: 100%;
            background-color: red;
            background: linear-gradient(to right,red 20%,yellow 50%, blue 100%);
        }
        #rg {
            height: 150px;
            width: 200px;
            background-color: green;
            background: radial-gradient(circle at top left,red 20%,yellow 50%, blue 100%);
        }
       #cg {
            width: 200px;
            height: 200px;
            background-color: blue;
            border-radius: 50%;
            background: conic-gradient(red,yellow, green, blue);
            /* background: conic-gradient(red 0deg 90 deg, blue 90 deg 180deg, green 180 deg 300 deg, yellow 300deg:360 deg); */
}
    </style>
    </head>
    <body>
        <h1>Linear Gradient</h1>
    <div id="lg"></div>
    <h1>Radial Gradient</h1>
    <div id="rg"></div>
    <h1>Conical Gradient</h1>
    <div id="cg"></div>
    </body>
</html>
