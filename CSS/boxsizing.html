<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content ="width=device-width, initial-scale=1.0">
    <title>Box Sizing in CSS</title>
    <style>
        h1 {
            text-shadow: 5dvi 5px 5px  aqua;
        }
        .nb {
            width: 100px;
            height: 100px;
            background-color:  aquamarine;
            padding: 10px;
            border: 5px solid  red;
            margin: 10px;
        }
        .cb {
            width: 100px;
            height: 100px;
            background-color: aquamarine;
            box-sizing: content-box;
            padding: 10px;
            margin: 10px;
            
        }

        .bb {
            width: 100px;
            height: 100px;
            background-color: aquamarine;
            box-sizing: border-box;
            padding: 10px;
            border: 5px solid  red;
            margin: 10px;
        }


    </style>
    </head>
    <body>

        <h1>Box Sizing</h1>
        <div class="nb">Normal Box</div>
           <div class="cb">Content Box</div>
              <div class="bb">Border Box</div>
        </body>
        </html>
