<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>DOM</title>
</head>
<body>
    <h1>DOM methods</h1>
   <p>getElementsbytagname</p>
   <p id="paraid" class="bluetext">getElementsbyId</p>
   <p class="bluetext">getElementsbyclassname</p>
   <p>getElementsbyname</p>
   <h4 class ="wb">Hello</h4>
   <h4 class="wb">Thank You</h4>
   <input type="text" placeholder="Enter your Fav Hero" name="fav hero">
   <p id="paravalue">Value displayed here</p>
   <button onclick="change()"> Click me to change</button>
   
   <script>
    let p = document.querySelectorAll("h4");
    p.forEach((p) => {p.style.backgroundColor = "black"; p.style.color = "white"});
    
    document.querySelector("h1").innerText = "<i>DOM methods in Javascript</i></h3>";
    //document.querySelector("h1").innerText = "DOM methods in Javascript";
    document.querySelector("button").textContent = "Click me";
    document.getElementsByTagName("p")[0].style.color = "green";
    document.getElementById("paraid").style.fontSize = "50px";



    let bt = document.getElementsByClassName("bluetext");
        for(let i=0; i<=bt.length; i++) {
            bt[i].style.color = "blue";
            bt[i].style.backgroundColor = "green";
        }

    function change() {
        let x = document.getElementsByName("favhero")[0].value;
        document.getElementById("paravalue").innerText = x;


    let paras = document.getElementsByTagName("p");
    for(let i=0; i<=paras.length; i++) {
    paras[i].style.color = "red";
    paras[i].style.backgroundColor = "yellow";
  }
}
   </script>
</body>
</html>
