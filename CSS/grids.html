<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content ="width=device-width, initial-scale=1.0">
    <title>Grids Template Areas</title>

    <style>
        body {
            font-family: Arial;
        }

        .container {
            display: grid;
            grid-template-columns: auto auto auto;
             grid-template-areas:
             "header header"
             "sidebar content"
             "footer footer";
             gap: 10px;
        }

   


.container div {
    background-color: blueviolet;
    border: 2px solid black;
    padding: 10px;
    font-size: 30px;
    text-align: center;
}

.item1 {
    grid-column-start: 1;
    grid-column-end: 4;
}

.item2 {
     grid-row-start: 2;
      grid-column-end: 4;
}



</style>
</head>
<body>
    <h1>The grid-column Property</h1>


    <div class="container">
    <div class="item1">Header</div>
    <div class="item2">Sidebar</div>
    <div class="item3">3</div>
    <div class="item4">4</div>
    <div class="item5">5</div>
   
    </div>
    </body>
    </html>
